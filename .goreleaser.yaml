# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: tsk

before:
  hooks:
    - go mod tidy

builds:
  - id: tsk
    main: ./cmd/tsk
    binary: tsk
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Coleim
    name: tsk
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

# Homebrew formula is generated in GitHub Actions workflow
# See .github/workflows/release.yml
